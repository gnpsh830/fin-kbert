services:
  kr-finbert-mcp:
    build: .
    container_name: kr-finbert-mcp
    ports:
      - "8000:8000"
    volumes:
      - ./KR-FinBert-SC:/models/KR-FinBert-SC:ro
      - hf-cache:/root/.cache/huggingface
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
      KR_FINBERT_MODEL: /models/KR-FinBert-SC
    restart: unless-stopped

volumes:
  hf-cache:
